name: Compilar APK de Flet

on:
  push:
    branches:
      - main  # Se ejecutará automáticamente cada vez que hagas "git push" a la rama main
  workflow_dispatch: # Te permite activar la compilación manualmente desde la web de GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Descargar el código del repositorio
      - name: Descargar repositorio
        uses: actions/checkout@v4

      # 2. Configurar Java (el motor de Android)
      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Configurar las herramientas de Android (SDK)
      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      # 4. Configurar Python
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 5. Instalar dependencias necesarias
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install flet

      # 6. Ejecutar la compilación nativa de Flet para Android
      - name: Compilar APK
        run: |
          flet build apk

      # 7. Subir la APK resultante a GitHub para que la puedas descargar
      - name: Subir APK terminada
        uses: actions/upload-artifact@v4
        with:
          name: GestorClaves-APK
          path: build/apk/*.apk
